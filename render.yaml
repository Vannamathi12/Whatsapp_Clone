services:
  - type: web
    name: whatsapp-clone-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: MESSAGE_RESTORE_WINDOW_MS
        value: 5000
